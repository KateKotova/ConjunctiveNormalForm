<h1>CNF - Conjunctive Normal Form</h1>
<h2>Преобразователь логических выражений ко множеству дизъюнктов</h2>
<p>Эта программа представляет собой преобразователь и интерпретатор логических выражений.
Здесь используется стандартный математико-логический синтаксис и реализован набор основных операций.</p>
